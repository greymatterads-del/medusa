<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino - Triplica tu Bono</title>
    <!-- No necesitamos Firebase SDK, usamos API REST -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .whatsapp-link {
            width: 100%;
            height: 100%;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 60px;
            position: relative;
        }

        .boton-click {
            width: 200px;
            height: auto;
            animation: bounce 1.5s infinite, pulse 2s infinite;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
            transition: transform 0.2s ease;
        }

        .whatsapp-link:hover .boton-click {
            transform: scale(1.1);
        }

        .whatsapp-link:active .boton-click {
            animation: none;
            transform: scale(0.95);
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
            }
            50% {
                filter: drop-shadow(0 10px 30px rgba(255, 215, 0, 0.6));
            }
        }

        /* Desktop - 16:9 */
        @media (min-width: 769px) {
            .container {
                background-image: url('fondo.png');
            }

            .boton-click {
                width: 200px;
            }
        }

        /* Móvil - 9:16 */
        @media (max-width: 768px) {
            .container {
                background-image: url('mobile.png');
            }

            .boton-click {
                width: 150px;
            }

            .whatsapp-link {
                padding-bottom: 0px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a id="whatsapp-link" 
           class="whatsapp-link" 
           target="_blank">            <img src="boton.png" alt="Reclama Ahora" class="boton-click">        </a>
    </div>

    <!-- No necesitamos Firebase SDK, usamos API REST -->

    <script>
        const FIREBASE_URL = 'https://numeros-bc5a2-default-rtdb.firebaseio.com/whatsappNumber.json';
        const NUMERO_DEFECTO = '2233403245';
        const MENSAJE = 'Hola%2C%20vengo%20de%20la%20web%20y%20quiero%20recibir%20mi%20bono!%20';

        // Actualizar link de WhatsApp cuando se carga la página
        window.addEventListener('DOMContentLoaded', function() {
            cargarNumeroDesdeFirebase();
        });

        // Cargar número desde Firebase (API REST)
        function cargarNumeroDesdeFirebase() {
            fetch(FIREBASE_URL)
                .then(response => response.json())
                .then(data => {
                    const numero = data || NUMERO_DEFECTO;
                    actualizarLinkWhatsapp(numero);
                    // Reintentar cada 10 segundos para detectar cambios
                    setTimeout(cargarNumeroDesdeFirebase, 10000);
                })
                .catch(error => {
                    console.error('Error al cargar:', error);
                    actualizarLinkWhatsapp(NUMERO_DEFECTO);
                    // Reintentar después de un error
                    setTimeout(cargarNumeroDesdeFirebase, 5000);
                });
        }

        // Actualizar el link de WhatsApp
        function actualizarLinkWhatsapp(numero) {
            const link = `https://wa.me/${numero}?text=${MENSAJE}`;
            document.getElementById('whatsapp-link').href = link;
        }
    </script>
</body>
</html>
